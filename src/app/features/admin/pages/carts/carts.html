<h1 class="text-2xl font-bold mb-4">{{ 'CARTS.HEADER' | translate }}</h1>

@if (items.isLoading()) {
  <p>{{ 'CARTS.LOADING' | translate }}</p>
} @else if (items.error() || !items.hasValue() || !items.value()?.length) {
  <app-alert alertText="CARTS.NO_CARTS"></app-alert>
} @else {
  @let carts = items.value();
  <app-table
    (delete)="deleteCart($event)"
    [columns]="columns"
    [data]="carts"
    entityName="carts"></app-table>
}
