<h1 class="text-2xl font-bold mb-4">{{ 'USERS.HEADER' | translate }}</h1>

@if (items.isLoading()) {
  <p>{{ 'USERS.LOADING' | translate }}</p>
} @else if (items.error() || !items.hasValue() || !items.value()?.length) {
  <app-alert alertText="USERS.NO_USERS"></app-alert>
} @else {
  @let products = items.value();
  <app-table
    (delete)="deleteUser($event)"
    [columns]="columns"
    [data]="products"
    entityName="user"></app-table>
}
