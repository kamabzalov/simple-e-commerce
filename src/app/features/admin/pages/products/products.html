<div class="flex justify-between items-center mb-4">
  <h1 class="text-2xl font-bold mb-4">{{ 'PRODUCTS.HEADER' | translate }}</h1>
  <a
    class="bg-indigo-500 hover:bg-indigo-700 cursor-pointer text-white p-2 rounded-sm"
    [routerLink]="['add-product']"
    >{{ 'PRODUCTS.ADD_PRODUCT' | translate }}</a
  >
</div>

@if (items.isLoading()) {
  <p>{{ 'PRODUCTS.LOADING' | translate }}</p>
} @else if (items.error() || !items.hasValue() || !items.value()?.length) {
  <app-alert alertText="PRODUCTS.NO_PRODUCTS"></app-alert>
} @else {
  @let products = items.value();
  <app-table
    (delete)="deleteProduct($event)"
    [columns]="columns"
    [data]="products"
    entityName="products"></app-table>
}
