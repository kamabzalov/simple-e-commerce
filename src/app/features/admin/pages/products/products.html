<h1 class="text-2xl font-bold mb-4">Products</h1>

@if (items.isLoading()) {
  <p>Loading...</p>
} @else if (items.error() || !items.hasValue() || !items.value()?.length) {
  <app-alert alertText="HOME.NO_PRODUCTS"></app-alert>
} @else {
  @let products = items.value();
  <app-table [columns]="columns" [data]="products" entityName="product"></app-table>
}
