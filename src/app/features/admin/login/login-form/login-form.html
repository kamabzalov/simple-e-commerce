<main class="bg-slate-50 h-screen flex items-center justify-center">
  <form class="shadow-sm bg-white p-8 rounded-lg">
    <h1 class="text-3xl mb-4">Login</h1>
    <div class="mb-4">
      <label class="font-bold" for="username">Username</label>
      <input
        class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 transition duration-200 focus:border-indigo-500"
        type="text"
        name="username"
        id="username"
        placeholder="Username" />
    </div>
    <div class="mb-4">
      <label class="font-bold" for="password">Password</label>
      <input
        class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 transition duration-200 focus:border-indigo-500"
        type="password"
        name="password"
        id="password"
        placeholder="Password" />
    </div>
    <div class="flex justify-end">
      <button class="bg-indigo-500 hover:bg-indigo-700 cursor-pointer text-white p-2 rounded-sm">
        Login
      </button>
    </div>
  </form>
</main>
